<script>
'use strict';
/* Módulo: Outliers — detección con IQR y z-score, boxplot interactivo */
registerModule({
  id:'outliers',
  title:'Outliers',
  lead:'Un outlier es un valor anómalamente lejos del resto. Detectarlo es fácil; '+
       'la decisión difícil es qué hacer con él — y para eso hay que mirar los datos.',
  build(sec){
    const NS='http://www.w3.org/2000/svg';
    const s=(tag,attrs={})=>{
      const n=document.createElementNS(NS,tag);
      for(const [k,v] of Object.entries(attrs))n.setAttribute(k,v);
      return n;
    };
    /* sueldos mensuales (miles de CLP) de analistas de datos — inspirado en DataAnalyst.csv del curso */
    const DATA=[650,720,780,810,690,850,920,880,760,730,990,1050,840,910,700,880,820,950,1100,760,890,3900,4800,150];

    const quantile=(arr,q)=>{ /* interpolación lineal, como numpy/pandas */
      const a=[...arr].sort((x,y)=>x-y);
      const pos=(a.length-1)*q, lo=Math.floor(pos), hi=Math.ceil(pos);
      return a[lo]+(a[hi]-a[lo])*(pos-lo);
    };
    const mean=a=>a.reduce((x,y)=>x+y,0)/a.length;
    const std=a=>{const m=mean(a);return Math.sqrt(a.reduce((s,x)=>s+(x-m)**2,0)/(a.length-1));};
    const fmt$=v=>'$'+Math.round(v).toLocaleString('es-CL');

    const card=el('div',{class:'card'},
      el('h3',{},'Detectar outliers: IQR, z-score y MAD'),
      el('p',{class:'note',html:'Sueldos mensuales (miles de pesos) de 24 analistas de datos. '+
        'Mueve el umbral y observa qué puntos quedan marcados como outliers. '+
        'Fíjate cómo la <b>media se arrastra</b> hacia los valores extremos mientras la <b>mediana casi no se mueve</b>: '+
        'por eso el boxplot (basado en cuartiles) es la herramienta robusta para esto.'}));
    sec.append(card);

    /* controles */
    const ctr=el('div',{class:'controls'});card.append(ctr);
    const selM=el('select',{},
      el('option',{value:'iqr'},'IQR (rango intercuartílico)'),
      el('option',{value:'z'},'z-score'),
      el('option',{value:'mad'},'MAD (desviación absoluta mediana)'));
    const rng=el('input',{type:'range',min:0.5,max:3,step:0.25,value:1.5,style:'width:140px'});
    const kLab=el('span',{style:'font-weight:700;min-width:2.4em;display:inline-block'},'k = 1,5');
    const bDrop=el('button',{class:'btn'},'🗑️ Eliminar outliers');
    const bRes=el('button',{class:'btn'},'⟲ Restaurar');
    ctr.append(el('label',{},'método: '),selM,el('label',{style:'margin-left:.6rem'},'umbral: '),rng,kLab,bDrop,bRes);

    /* svg */
    const W=740,H=196,L=54,R=24,plotW=W-L-R;
    const svgWrap=el('div',{style:'overflow-x:auto'});card.append(svgWrap);
    /* min-width: en un celular el gráfico se desplaza horizontal en vez de encogerse */
    const svg=s('svg',{viewBox:`0 0 ${W} ${H}`,style:'width:100%;max-width:900px;min-width:540px;display:block'});
    svgWrap.append(svg);
    const gAxis=s('g'),gBox=s('g'),gFence=s('g'),gPts=s('g');
    svg.append(gAxis,gFence,gBox,gPts);
    /* leyenda */
    card.append(el('div',{class:'legend'},
      el('span',{},el('span',{class:'sw',style:'background:var(--s1)'}),'dato'),
      el('span',{},el('span',{class:'sw',style:'background:var(--s8)'}),'outlier según el umbral'),
      el('span',{},el('span',{class:'sw',style:'background:transparent;border:1px dashed var(--muted)'}),'límites (cercas)')));
    const stats=el('div',{class:'msg'});card.append(stats);
    const chips=el('div');card.append(chips);
    const code=codeBox(card);
    card.append(el('p',{class:'note',html:'<b>¿IQR, z-score o MAD?</b> El z-score usa media y desviación estándar, que los mismos outliers '+
      'distorsionan (¡el outlier se esconde a sí mismo!). El IQR usa cuartiles, robustos. El <b>MAD</b> es aún más duro de engañar: '+
      'mediana de las distancias a la mediana — cambia el método aquí arriba y nota que sus cercas casi no se mueven al eliminar outliers. '+
      'Regla práctica del curso: boxplot/IQR primero, z-score solo si la variable es aproximadamente normal, MAD cuando hay muchos extremos. '+
      '(La clase 15 menciona además <i>Isolation Forest</i>, un método de ML fuera del alcance de este visualizador.) '+
      'Y antes de borrar un outlier pregúntate: ¿es un error de digitación o un dato real e interesante?'}));

    /* puntos persistentes */
    let active=[...DATA]; // valores vigentes (tras eliminar)
    const circles=DATA.map((v,i)=>{
      const c=s('circle',{r:5.5,fill:'var(--s1)','fill-opacity':.85,style:'transition:opacity .5s, fill .3s'});
      const hit=s('circle',{r:11,fill:'transparent'});
      const t=s('title');t.textContent=`analista ${i+1}: ${fmt$(v)} mil`;
      c.append(t);
      gPts.append(c,hit);
      return {c,hit,v,i,removed:false};
    });

    function config(){ /* reconfigura slider según método */
      if(selM.value==='iqr'){rng.min=0.5;rng.max=3;rng.step=0.25;rng.value=1.5;}
      else if(selM.value==='z'){rng.min=1;rng.max=3.5;rng.step=0.25;rng.value=3;}
      else{rng.min=2;rng.max=5;rng.step=0.25;rng.value=3.5;} /* MAD: umbral típico 3.5 */
      update();
    }
    function update(){
      const k=+rng.value;
      kLab.textContent='k = '+String(k).replace('.',',');
      const vals=circles.filter(p=>!p.removed).map(p=>p.v);
      const q1=quantile(vals,.25),q3=quantile(vals,.75),iqr=q3-q1;
      const m=mean(vals),sd=std(vals),med=quantile(vals,.5);
      const mad=quantile(vals.map(v=>Math.abs(v-med)),.5);
      let lo,hi;
      if(selM.value==='iqr'){lo=q1-k*iqr;hi=q3+k*iqr;}
      else if(selM.value==='z'){lo=m-k*sd;hi=m+k*sd;}
      /* z modificado: 0.6745·(x−med)/MAD > k  ⇔  x fuera de med ± k·MAD/0.6745 */
      else{lo=med-k*mad/0.6745;hi=med+k*mad/0.6745;}
      /* escala */
      const vmin=Math.min(...vals,lo),vmax=Math.max(...vals,hi);
      const pad=(vmax-vmin)*.05;
      const x=v=>L+ (v-(vmin-pad))/((vmax+pad)-(vmin-pad))*plotW;
      /* eje */
      gAxis.textContent='';
      gAxis.append(s('line',{x1:L,x2:W-R,y1:H-18,y2:H-18,class:'axisline'}));
      const span=vmax-vmin;
      const step=span>3000?1000:span>1200?500:250;
      for(let v=Math.ceil(vmin/step)*step;v<=vmax;v+=step){
        gAxis.append(s('line',{x1:x(v),x2:x(v),y1:30,y2:H-18,class:'gridline'}));
        const t=s('text',{x:x(v),y:H-4,'text-anchor':'middle'});t.textContent=v.toLocaleString('es-CL');
        gAxis.append(t);
      }
      /* cercas */
      gFence.textContent='';
      for(const [v,lbl] of [[lo,'lím. inf'],[hi,'lím. sup']]){
        gFence.append(s('line',{x1:x(v),x2:x(v),y1:26,y2:H-18,stroke:'var(--muted)','stroke-dasharray':'4 4'}));
        const t=s('text',{x:x(v),y:20,'text-anchor':'middle'});t.textContent=lbl;
        gFence.append(t);
      }
      /* boxplot (siempre por cuartiles, se dibuja sobre los datos vigentes) */
      gBox.textContent='';
      const yB=52,hB=34;
      const inFence=vals.filter(v=>v>=lo&&v<=hi);
      const wLo=Math.min(...inFence),wHi=Math.max(...inFence);
      gBox.append(
        s('line',{x1:x(wLo),x2:x(q1),y1:yB,y2:yB,class:'axisline'}),
        s('line',{x1:x(q3),x2:x(wHi),y1:yB,y2:yB,class:'axisline'}),
        s('line',{x1:x(wLo),x2:x(wLo),y1:yB-8,y2:yB+8,class:'axisline'}),
        s('line',{x1:x(wHi),x2:x(wHi),y1:yB-8,y2:yB+8,class:'axisline'}),
        s('rect',{x:x(q1),y:yB-hB/2,width:Math.max(1,x(q3)-x(q1)),height:hB,rx:4,
          fill:'color-mix(in srgb, var(--s1) 22%, transparent)',stroke:'var(--s1)'}),
        s('line',{x1:x(med),x2:x(med),y1:yB-hB/2,y2:yB+hB/2,stroke:'var(--s1)','stroke-width':2.5}));
      /* puntos */
      const outs=[];
      circles.forEach((p,i)=>{
        const yJ=96+((i*37)%64);
        p.c.setAttribute('cx',x(p.v));p.c.setAttribute('cy',yJ);
        p.hit.setAttribute('cx',x(p.v));p.hit.setAttribute('cy',yJ);
        if(p.removed){p.c.style.opacity=0;p.hit.style.pointerEvents='none';return;}
        p.c.style.opacity=1;p.hit.style.pointerEvents='';
        const isOut=p.v<lo||p.v>hi;
        p.c.setAttribute('fill',isOut?'var(--s8)':'var(--s1)');
        if(isOut)outs.push(p.v);
      });
      /* lecturas */
      stats.innerHTML=`Q1=${fmt$(q1)} · mediana=${fmt$(med)} · Q3=${fmt$(q3)} · `+
        `límites [${fmt$(lo)}, ${fmt$(hi)}] · <b style="color:var(--s8)">${outs.length} outlier${outs.length===1?'':'s'}</b> · `+
        `media=${fmt$(m)} vs mediana=${fmt$(med)}`;
      chips.textContent='';
      outs.sort((a,b)=>a-b).forEach(v=>chips.append(el('span',{class:'chip',style:'border-color:var(--s8);color:var(--s8)'},fmt$(v))));
      if(selM.value==='iqr'){
        code.innerHTML=`Q1, Q3 = df['sueldo'].quantile([0.25, 0.75])\nIQR = Q3 - Q1                        # ${fmt$(iqr)}\nlim_inf = Q1 - <b>${String(k).replace('.',',')}</b>*IQR              # ${fmt$(lo)}\nlim_sup = Q3 + <b>${String(k).replace('.',',')}</b>*IQR              # ${fmt$(hi)}\noutliers = df[(df['sueldo'] < lim_inf) | (df['sueldo'] > lim_sup)]   # ${outs.length} filas`;
      }else if(selM.value==='z'){
        code.innerHTML=`z = (df['sueldo'] - df['sueldo'].mean()) / df['sueldo'].std()\noutliers = df[z.abs() > <b>${String(k).replace('.',',')}</b>]        # ${outs.length} filas`;
      }else{
        code.innerHTML=`med = df['sueldo'].median()                      # ${fmt$(med)}\nMAD = (df['sueldo'] - med).abs().median()        # ${fmt$(mad)}\nz_mod = 0.6745 * (df['sueldo'] - med) / MAD\noutliers = df[z_mod.abs() > <b>${String(k).replace('.',',')}</b>]      # ${outs.length} filas`;
      }
      return {lo,hi};
    }
    selM.onchange=config;
    rng.oninput=update;
    bDrop.onclick=()=>{
      const {lo,hi}=update();
      circles.forEach(p=>{if(!p.removed&&(p.v<lo||p.v>hi))p.removed=true;});
      update();
    };
    bRes.onclick=()=>{circles.forEach(p=>p.removed=false);update();};
    update();
  }
});

</script>
<script>
'use strict';
/* =====================================================================
   Módulo: Data wrangling (Semanas 9–10)
   ===================================================================== */
(function(){

  registerModule({
    id:'wrangling',
    title:'Data wrangling',
    lead:'Limpiar y transformar: duplicados, reemplazos, discretización y ordenamiento.',
    build(section){
      buildDuplicados(section);
      buildReemplazo(section);
      buildCut(section);
      buildOrden(section);
    }
  });

  /* ---------------- Tarjeta 1: Duplicados ---------------- */
  function buildDuplicados(section){
    const DATA = {
      index:[0,1,2,3,4,5,6],
      columns:['cliente','producto','monto'],
      rows:[
        ['Ana','Café',2500],
        ['Luis','Té',1800],
        ['Ana','Café',2500],
        ['Marta','Jugo',2200],
        ['Luis','Té',1800],
        ['Pedro','Café',2600],
        ['Ana','Café',2500],
      ]
    };
    // grupos de filas exactamente iguales en todas las columnas
    const GROUPS = [[0,2,6],[1,4]];
    function dupRows(keep){
      const out=[];
      for(const g of GROUPS){
        if(keep==='first') out.push(...g.slice(1));
        else if(keep==='last') out.push(...g.slice(0,-1));
        else out.push(...g); // keep === 'false' → False
      }
      return out.sort((a,b)=>a-b);
    }
    function keepDisplay(keep){ return keep==='false' ? 'False' : `'${keep}'`; }

    const card = el('div',{class:'card'}, el('h3',{},'Duplicados'));
    section.append(card);
    const table = new DfTable(card,{index:DATA.index,columns:DATA.columns,rows:DATA.rows,caption:'df — ventas'});

    const selectKeep = el('select',{},
      el('option',{value:'first'},"'first'"),
      el('option',{value:'last'},"'last'"),
      el('option',{value:'false'},'False'),
    );
    const controls = el('div',{class:'controls'},
      el('label',{},'keep = '),
      selectKeep,
      el('button',{class:'btn',onclick:()=>marcar()},'Marcar duplicated(keep=…)'),
      el('button',{class:'btn',onclick:()=>dropDup()},'drop_duplicates()'),
      el('button',{class:'btn',onclick:()=>restaurar()},'Restaurar'),
    );
    card.append(controls);
    const msg = el('div',{class:'msg'},'.duplicated().sum() = —');
    card.append(msg);
    const code = codeBox(card);

    function marcar(){
      table.clearMarks();
      const keep = selectKeep.value;
      const rows = dupRows(keep);
      rows.forEach(i=>{
        table.rowEls[i]._idx.classList.add('dupe');
        table.cellEls[i].forEach(c=>c.classList.add('dupe'));
      });
      msg.textContent = `.duplicated().sum() = ${rows.length}`;
      code.innerHTML = `df.duplicated(keep=<b>${keepDisplay(keep)}</b>)`;
    }

    async function dropDup(){
      table.clearMarks();
      const keep = selectKeep.value;
      const rows = dupRows(keep);
      msg.textContent = `.duplicated().sum() = ${rows.length}`;
      code.innerHTML = `df.drop_duplicates(keep=<b>${keepDisplay(keep)}</b>)`;
      for(const i of rows){
        table.rowEls[i]._idx.classList.add('dupe');
        table.cellEls[i].forEach(c=>c.classList.add('dupe'));
        table.rowEls[i].classList.add('roff');
        await sleep(180);
      }
    }

    function restaurar(){
      table.clearMarks();
      msg.textContent = '.duplicated().sum() = —';
      code.textContent = '# elige "keep" y presiona un botón ↑';
    }

    restaurar();
  }

  /* ---------------- Tarjeta 2: Reemplazo y mapeo ---------------- */
  function buildReemplazo(section){
    const DATA = {
      index:[0,1,2,3,4],
      columns:['respuesta','comuna'],
      rows:[
        ['sí','Concepción'],
        ['no','Talcahuano'],
        ['sí','Hualpén'],
        ['s/r','Concepción'],
        ['no','Hualpén'],
      ]
    };

    const card = el('div',{class:'card'}, el('h3',{},'Reemplazo y mapeo'));
    section.append(card);
    const table = new DfTable(card,{index:DATA.index,columns:DATA.columns,rows:DATA.rows,caption:'df — encuesta'});

    const controls = el('div',{class:'controls'},
      el('button',{class:'btn',onclick:()=>doReplace()},"replace({'sí':1,'no':0})"),
      el('button',{class:'btn',onclick:()=>doMap()},"map({'sí':1,'no':0})"),
      el('button',{class:'btn',onclick:()=>restaurar()},'Restaurar'),
    );
    card.append(controls);
    const note = el('div',{class:'note'},'Elige una operación para ver cómo transforma la columna «respuesta».');
    card.append(note);
    const code = codeBox(card);
    code.textContent = '# elige un botón arriba ↑';

    async function doReplace(){
      table.render();
      for(let i=0;i<DATA.rows.length;i++){
        const cell = table.cellEls[i][0];
        cell.classList.add('hl');
        await sleep(350);
        const val = DATA.rows[i][0];
        cell.classList.remove('hl');
        if(val==='sí'){ cell.textContent='1'; cell.classList.add('fill'); }
        else if(val==='no'){ cell.textContent='0'; cell.classList.add('fill'); }
        // 's/r' no está en el diccionario → se deja intacto
      }
      note.innerHTML = "replace() solo cambia los valores presentes en el diccionario ('sí'→1, 'no'→0). <b>'s/r' no está en el diccionario, así que queda igual.</b>";
      code.innerHTML = `df['respuesta'] = df['respuesta'].<b>replace</b>({'sí': 1, 'no': 0})`;
    }

    async function doMap(){
      table.render();
      for(let i=0;i<DATA.rows.length;i++){
        const cell = table.cellEls[i][0];
        cell.classList.add('hl');
        await sleep(350);
        const val = DATA.rows[i][0];
        cell.classList.remove('hl');
        if(val==='sí'){ cell.textContent='1'; cell.classList.add('fill'); }
        else if(val==='no'){ cell.textContent='0'; cell.classList.add('fill'); }
        else{ cell.textContent='NaN'; cell.className='dfc nan'; }
      }
      note.innerHTML = "<b>map() reemplaza según el diccionario, pero cualquier valor que NO sea una clave se convierte en NaN.</b> Por eso 's/r' se pierde como dato — a diferencia de replace(), que lo deja intacto.";
      code.innerHTML = `df['respuesta'] = df['respuesta'].<b>map</b>({'sí': 1, 'no': 0})`;
    }

    function restaurar(){
      table.render();
      note.textContent = 'Elige una operación para ver cómo transforma la columna «respuesta».';
      code.textContent = '# elige un botón arriba ↑';
    }
  }

  /* ---------------- Tarjeta 3: Discretización con pd.cut ---------------- */
  function buildCut(section){
    const NOMBRES = ['Sofía','Benjamín','Pedro','Elena','Rosa','Manuel','Diego','Emilia'];
    const EDADES  = [15,22,34,45,61,70,28,8];
    const DATA = {
      index: EDADES.map((_,i)=>i),
      columns:['nombre','edad','grupo'],
      rows: NOMBRES.map((n,i)=>[n,EDADES[i],''])
    };
    const BINS = [0,18,40,65,120];
    const LABELS = ['niñez','adulto joven','adulto','mayor'];
    const GCLS = ['g0','g1','g2','g3'];
    function binIndex(age){
      for(let i=0;i<BINS.length-1;i++){ if(age>BINS[i] && age<=BINS[i+1]) return i; }
      return -1;
    }

    const card = el('div',{class:'card'}, el('h3',{},'Discretización con pd.cut'));
    section.append(card);
    const table = new DfTable(card,{index:DATA.index,columns:DATA.columns,rows:DATA.rows,caption:'df — personas'});

    const controls = el('div',{class:'controls'},
      el('button',{class:'btn',onclick:()=>aplicar()},'Aplicar pd.cut(bins=[0,18,40,65,120])'),
      el('button',{class:'btn',onclick:()=>restaurar()},'Restaurar'),
    );
    card.append(controls);

    const legend = el('div',{class:'legend'},
      el('span',{}, el('span',{class:'sw',style:'background:var(--s1)'}),'niñez  (0, 18]'),
      el('span',{}, el('span',{class:'sw',style:'background:var(--s2)'}),'adulto joven  (18, 40]'),
      el('span',{}, el('span',{class:'sw',style:'background:var(--s3)'}),'adulto  (40, 65]'),
      el('span',{}, el('span',{class:'sw',style:'background:var(--s4)'}),'mayor  (65, 120]'),
    );
    card.append(legend);

    const note = el('div',{class:'note',html:'Los intervalos de pd.cut son <b>(a, b]</b>: abiertos a la izquierda, cerrados a la derecha. Por eso alguien de exactamente 18 años cae en «niñez», no en «adulto joven».'});
    card.append(note);

    const code = codeBox(card);
    code.innerHTML = `pd.cut(df['edad'],\n       bins=<b>[0, 18, 40, 65, 120]</b>,\n       labels=<b>['niñez', 'adulto joven', 'adulto', 'mayor']</b>)`;

    async function aplicar(){
      for(let i=0;i<DATA.rows.length;i++){
        const cell = table.cellEls[i][2];
        cell.classList.add('hl');
        await sleep(300);
        const bi = binIndex(DATA.rows[i][1]);
        cell.classList.remove('hl');
        cell.textContent = LABELS[bi];
        cell.classList.add(GCLS[bi]);
      }
    }
    function restaurar(){ table.render(); }
  }

  /* ---------------- Tarjeta 4: Ordenamiento ---------------- */
  function buildOrden(section){
    const DATA = {
      index:['E01','E02','E03','E04','E05'],
      columns:['nombre','carrera','promedio','generación'],
      rows:[
        ['Valentina','ICI',6.1,2023],
        ['Matías','IECI',5.4,2024],
        ['Camila','ICI',4.9,2022],
        ['Joaquín','IIND',6.5,2023],
        ['Antonia','IECI',5.8,2024],
      ]
    };

    const card = el('div',{class:'card'}, el('h3',{},'Ordenamiento'));
    section.append(card);
    const table = new DfTable(card,{index:DATA.index,columns:DATA.columns,rows:DATA.rows,caption:'df — estudiantes'});

    const selCol = el('select',{},
      el('option',{value:'promedio'},'promedio'),
      el('option',{value:'nombre'},'nombre'),
      el('option',{value:'generación'},'generación'),
    );
    const selAsc = el('select',{},
      el('option',{value:'true'},'True'),
      el('option',{value:'false'},'False'),
    );
    const controls = el('div',{class:'controls'},
      el('label',{},'by = '), selCol,
      el('label',{},'ascending = '), selAsc,
      el('button',{class:'btn',onclick:()=>doSort()},'sort_values()'),
      el('button',{class:'btn',onclick:()=>doRestore()},'Restaurar orden original'),
    );
    card.append(controls);
    const code = codeBox(card);
    code.innerHTML = `df.sort_values(by=<b>'promedio'</b>, ascending=<b>True</b>)`;

    function doSort(){
      const col = selCol.value;
      const asc = selAsc.value==='true';
      const colIdx = DATA.columns.indexOf(col);
      const order = DATA.rows.map((_,i)=>i).sort((a,b)=>{
        const va=DATA.rows[a][colIdx], vb=DATA.rows[b][colIdx];
        const cmp = (typeof va==='number') ? (va-vb) : String(va).localeCompare(String(vb),'es');
        return asc ? cmp : -cmp;
      });
      flipRows(table.root, ()=>{
        order.forEach(i=>table.root.appendChild(table.rowEls[i]));
      });
      code.innerHTML = `df.sort_values(by=<b>'${col}'</b>, ascending=<b>${asc?'True':'False'}</b>)`;
    }

    function doRestore(){
      flipRows(table.root, ()=>{
        DATA.rows.forEach((_,i)=>table.root.appendChild(table.rowEls[i]));
      });
      code.innerHTML = `df.sort_values(by=<b>'promedio'</b>, ascending=<b>True</b>)`;
    }
  }

})();

</script>
<script>
'use strict';
/* Módulo: GroupBy y pivoteo — split-apply-combine animado y pivot_table como heatmap */
registerModule({
  id:'groupby',
  title:'GroupBy y pivoteo',
  lead:'groupby es split-apply-combine: separar las filas por una llave, aplicar una función '+
       'a cada grupo y recombinar los resultados en una tabla indexada por la llave.',
  build(sec){
    /* ventas de una cafetería universitaria — inspirado en cafe_sales.csv del curso */
    const COLS=['producto','sucursal','monto'];
    const ROWS=[
      ['Café','Centro',2500],['Té','Campus',1800],['Café','Campus',2600],
      ['Jugo','Centro',2200],['Té','Centro',1900],['Café','Centro',2400],
      ['Jugo','Campus',2100],['Té','Campus',1700],['Café','Campus',2700]];
    const KEYS=['Café','Té','Jugo'];               // orden de aparición → orden de grupos
    const GCLS={ 'Café':'g0','Té':'g1','Jugo':'g2' };
    const AGG={
      sum:  {label:'sum',  f:a=>a.reduce((x,y)=>x+y,0)},
      mean: {label:'mean', f:a=>a.reduce((x,y)=>x+y,0)/a.length},
      count:{label:'count',f:a=>a.length},
      max:  {label:'max',  f:a=>Math.max(...a)},
    };
    const groupsOf=key=>ROWS.map((r,i)=>[r,i]).filter(([r])=>r[0]===key);

    /* ---------- Tarjeta 1: split-apply-combine ---------- */
    {
      const card=el('div',{class:'card'},
        el('h3',{html:'<code>groupby</code> paso a paso'}),
        el('p',{class:'note',html:'9 boletas de una cafetería. Vamos a calcular el total vendido por producto: '+
          '<code>df.groupby(\'producto\')[\'monto\'].sum()</code>'}));
      sec.append(card);
      const ctr=el('div',{class:'controls'});card.append(ctr);
      const selA=el('select',{},Object.keys(AGG).map(k=>el('option',{value:k},AGG[k].label)));
      ctr.append(el('label',{},'función de agregación: '),selA);
      const cols=el('div',{class:'flexcols'});card.append(cols);
      const left=el('div'),right=el('div');cols.append(left,right);
      const table=new DfTable(left,{caption:'df (boletas)',columns:COLS,index:[...ROWS.keys()],rows:ROWS});
      const resMount=el('div');right.append(resMount);
      const code=codeBox(card);
      const origOrder=[...table.rowEls];

      let resTable=null;
      function clearResult(){resMount.textContent='';resTable=null;}
      function showResult(upTo /* nº de grupos listos */){
        clearResult();
        const agg=AGG[selA.value];
        const rows=KEYS.slice(0,upTo).map(k=>[agg.f(groupsOf(k).map(([r])=>r[2]))]);
        resTable=new DfTable(resMount,{caption:`resultado (${agg.label})`,columns:['monto'],
          index:KEYS.slice(0,upTo),rows});
        rows.forEach((_,ri)=>{
          resTable.cell(ri,0).classList.add(GCLS[KEYS[ri]]);
          resTable.rowEls[ri]._idx.classList.add(GCLS[KEYS[ri]]);
        });
      }
      function colorRows(){
        ROWS.forEach((r,ri)=>{
          table.rowEls[ri].querySelectorAll('.dfc').forEach(c=>c.classList.add(GCLS[r[0]]));
        });
      }
      function reset(){
        table.clearMarks();clearResult();
        origOrder.forEach(r=>table.root.append(r));
        code.innerHTML=`df.groupby('producto')['monto'].<b>${AGG[selA.value].label}</b>()`;
      }
      const steps=[
        {d:'<b>La llave.</b> <code>groupby(\'producto\')</code> etiqueta cada fila según su valor '+
           'en la columna <code>producto</code>. Cada color es un grupo: todavía no se movió nada.',
         async run(){ colorRows(); }},
        {d:'<b>Split.</b> Conceptualmente, las filas se separan en un mini-DataFrame por grupo '+
           '(4 boletas de Café, 3 de Té, 2 de Jugo). El orden original deja de importar.',
         async run(last){
           colorRows();
           flipRows(table.root,()=>{
             KEYS.forEach(k=>groupsOf(k).forEach(([,ri])=>table.root.append(table.rowEls[ri])));
           });
           if(last)await sleep(600);
         }},
        {d:'<b>Apply.</b> A la columna <code>monto</code> de cada grupo se le aplica la función. '+
           'Cada grupo completo colapsa en un único valor.',
         async run(last){
           colorRows();
           KEYS.forEach(k=>groupsOf(k).forEach(([,ri])=>table.root.append(table.rowEls[ri])));
           for(let g=0;g<KEYS.length;g++){
             if(last){
               groupsOf(KEYS[g]).forEach(([,ri])=>table.cell(ri,2).classList.add('hl'));
               await sleep(420);
             }
             showResult(g+1);
           }
         }},
        {d:'<b>Combine.</b> Los tres valores se recombinan en una Serie cuyo <b>índice es la llave</b> '+
           '(ya no 0…8, sino Café/Té/Jugo). Eso es todo groupby: split → apply → combine.',
         async run(){
           colorRows();
           KEYS.forEach(k=>groupsOf(k).forEach(([,ri])=>table.root.append(table.rowEls[ri])));
           table.rowEls.forEach(r=>r.classList.add('roff'));
           showResult(3);
           const agg=AGG[selA.value];
           const vals=KEYS.map(k=>fmt(agg.f(groupsOf(k).map(([r])=>r[2]))));
           code.innerHTML=`df.groupby('producto')['monto'].<b>${agg.label}</b>()\n# producto\n`+
             KEYS.map((k,i)=>`# ${k.padEnd(8)}${vals[i]}`).join('\n')+`\n# Name: monto, dtype: ${agg.label==='mean'?'float64':'int64'}`;
         }},
      ];
      const st=new Stepper(card,steps,reset,'groupby');
      selA.onchange=()=>st.go(st.i);
      reset();
    }

    /* ---------- Tarjeta 2: pivot_table ---------- */
    {
      const card=el('div',{class:'card'},
        el('h3',{html:'<code>pivot_table</code>: groupby en dos dimensiones'}),
        el('p',{class:'note',html:'Un pivote agrupa por <b>dos llaves a la vez</b>: una queda como índice (filas) '+
          'y la otra se convierte en columnas. La celda (Café, Centro) contiene la agregación de las boletas '+
          'que cumplen ambas condiciones. El color codifica la magnitud (más oscuro = más alto).'}));
      sec.append(card);
      const ctr=el('div',{class:'controls'});card.append(ctr);
      const selA=el('select',{},['sum','mean','count'].map(k=>el('option',{value:k},k)));
      ctr.append(el('label',{},'aggfunc: '),selA);
      const mount=el('div');card.append(mount);
      const code=codeBox(card);
      const SUC=['Campus','Centro'];
      const RAMP=['--seq100','--seq200','--seq300','--seq400','--seq500','--seq600','--seq700'];
      function render(){
        mount.textContent='';
        const agg=AGG[selA.value];
        const rows=KEYS.map(k=>SUC.map(s=>{
          const sub=ROWS.filter(r=>r[0]===k&&r[1]===s).map(r=>r[2]);
          return agg.f(sub);
        }));
        const t=new DfTable(mount,{caption:'pivot (producto × sucursal)',columns:SUC,index:KEYS,rows});
        const flat=rows.flat(),lo=Math.min(...flat),hi=Math.max(...flat);
        rows.forEach((row,ri)=>row.forEach((v,ci)=>{
          const k=hi===lo?3:Math.round((v-lo)/(hi-lo)*6);
          const c=t.cell(ri,ci);
          c.style.background=`var(${RAMP[k]})`;
          /* la rampa es fija en ambos temas: la tinta también debe serlo */
          c.style.color=k>=3?'#fff':'#0b0b0b';
          c.style.fontWeight='600';
        }));
        code.innerHTML=`pd.pivot_table(df, values='monto',\n               index='producto', columns='sucursal',\n               aggfunc=<b>'${selA.value}'</b>)`;
      }
      selA.onchange=render;
      render();
    }
  }
});

</script>
<script>
'use strict';
/* Módulo: Joins y concatenación — merge con llaves conectadas, Venn y concat */
registerModule({
  id:'merge',
  title:'Joins y concat',
  lead:'merge une dos tablas emparejando filas por una llave común. El parámetro how decide '+
       'qué pasa con las filas que no encuentran pareja.',
  build(sec){
    const NS='http://www.w3.org/2000/svg';
    const s=(tag,attrs={})=>{const n=document.createElementNS(NS,tag);
      for(const [k,v] of Object.entries(attrs))n.setAttribute(k,v);return n;};

    /* ---------- Tarjeta 1: merge ---------- */
    {
      /* inspirado en estudiantes.csv / carreras.csv de la Semana 12 */
      const EST=[['Valentina',10],['Matías',20],['Camila',10],['Joaquín',30],['Antonia',99]];
      const CAR=[[10,'ICI'],[20,'IECI'],[30,'IIND'],[40,'Arquitectura']];
      const KEYCLS={10:'g0',20:'g1',30:'g2'};
      const KEYCOL={10:'var(--s1)',20:'var(--s2)',30:'var(--s3)'};
      const MATCH=[['Valentina',10,'ICI'],['Matías',20,'IECI'],['Camila',10,'ICI'],['Joaquín',30,'IIND']];
      const LEFTONLY=[['Antonia',99,null]], RIGHTONLY=[[null,40,'Arquitectura']];

      const card=el('div',{class:'card'},
        el('h3',{html:'<code>merge</code>: unir por una llave'}),
        el('p',{class:'note',html:'Cada línea conecta una llave <code>id_carrera</code> que existe en ambas tablas. '+
          'Antonia (99) y Arquitectura (40) <b>no tienen pareja</b>: su destino depende de <code>how</code>.'}));
      sec.append(card);

      const ctr=el('div');card.append(ctr);
      const holder=el('div',{style:'position:relative'});card.append(holder);
      const cols=el('div',{class:'flexcols',style:'gap:4.5rem'});holder.append(cols);
      const dEst=el('div'),dCar=el('div');cols.append(dEst,dCar);
      const tEst=new DfTable(dEst,{caption:'estudiantes',columns:['nombre','id_carrera'],index:[0,1,2,3,4],rows:EST});
      const tCar=new DfTable(dCar,{caption:'carreras',columns:['id_carrera','carrera'],index:[0,1,2,3],rows:CAR});
      const overlay=s('svg',{style:'position:absolute;inset:0;width:100%;height:100%;pointer-events:none'});
      holder.append(overlay);
      const venn=s('svg',{viewBox:'0 0 150 90',style:'width:130px;display:block'});
      const vennWrap=el('div',{class:'controls'},venn,el('span',{class:'msg',id:'mergemsg'}));
      card.append(vennWrap);
      const resMount=el('div');card.append(resMount);
      const code=codeBox(card);
      card.append(el('p',{class:'note',html:'Ojo con las llaves repetidas: Camila y Valentina comparten la carrera 10, '+
        'y ambas encuentran pareja — un join puede <b>duplicar</b> información del lado derecho (ICI aparece dos veces). '+
        'Si ambos lados tienen la llave repetida, el resultado crece multiplicativamente.'}));

      let how='inner';
      function markKeys(){
        tEst.clearMarks();tCar.clearMarks();
        EST.forEach((r,ri)=>{const k=r[1];
          tEst.cell(ri,1).classList.add(KEYCLS[k]||'hl');});
        CAR.forEach((r,ri)=>{const k=r[0];
          tCar.cell(ri,0).classList.add(KEYCLS[k]||'hl');});
        /* filas que este how descarta */
        if(how==='inner'||how==='right')tEst.rowEls[4].classList.add('roff');
        if(how==='inner'||how==='left')tCar.rowEls[3].classList.add('roff');
      }
      function drawLinks(){
        overlay.textContent='';
        const base=holder.getBoundingClientRect();
        EST.forEach((re,ri)=>{
          CAR.forEach((rc,ci)=>{
            if(re[1]!==rc[0])return;
            const a=tEst.cell(ri,1).getBoundingClientRect();
            const b=tCar.cell(ci,0).getBoundingClientRect();
            const x1=a.right-base.left, y1=a.top+a.height/2-base.top;
            const x2=b.left-base.left,  y2=b.top+b.height/2-base.top;
            if(x2<=x1)return; // layout apilado (pantalla angosta): no dibujar
            const mx=(x1+x2)/2;
            overlay.append(s('path',{d:`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`,
              fill:'none',stroke:KEYCOL[re[1]],'stroke-width':2,'stroke-opacity':.75}));
          });
        });
      }
      function drawVenn(){
        venn.textContent='';
        const defs=s('defs');
        const clip=s('clipPath',{id:'vclip'});clip.append(s('circle',{cx:95,cy:45,r:32}));
        defs.append(clip);venn.append(defs);
        const fill='color-mix(in srgb, var(--s1) 45%, transparent)';
        const none='transparent';
        const L=s('circle',{cx:55,cy:45,r:32,fill:(how==='left'||how==='outer')?fill:none,stroke:'var(--muted)'});
        const R=s('circle',{cx:95,cy:45,r:32,fill:(how==='right'||how==='outer')?fill:none,stroke:'var(--muted)'});
        const inter=s('circle',{cx:55,cy:45,r:32,fill:fill,'clip-path':'url(#vclip)'});
        venn.append(L,R,inter);
        const t1=s('text',{x:38,y:48,'text-anchor':'middle'});t1.textContent='izq';
        const t2=s('text',{x:112,y:48,'text-anchor':'middle'});t2.textContent='der';
        venn.append(t1,t2);
      }
      function render(){
        markKeys();drawVenn();
        let rows=[...MATCH];
        if(how==='left')rows=[...MATCH,...LEFTONLY];
        if(how==='right')rows=[...MATCH,...RIGHTONLY];
        if(how==='outer')rows=[...MATCH,...LEFTONLY,...RIGHTONLY];
        resMount.textContent='';
        const t=new DfTable(resMount,{caption:`resultado — how='${how}' (${rows.length} filas)`,
          columns:['nombre','id_carrera','carrera'],index:[...rows.keys()],rows});
        rows.forEach((r,ri)=>{const k=r[1];
          t.cell(ri,1).classList.add(KEYCLS[k]||'hl');});
        $('#mergemsg').innerHTML={
          inner:'<b>inner</b>: solo las filas con pareja en ambas tablas. Antonia y Arquitectura quedan fuera.',
          left:'<b>left</b>: todas las filas de la izquierda. Antonia entra, pero su carrera es <b>NaN</b>.',
          right:'<b>right</b>: todas las filas de la derecha. Arquitectura entra sin estudiante (nombre NaN).',
          outer:'<b>outer</b>: todo el mundo entra; lo que no calza se rellena con NaN.',
        }[how];
        code.innerHTML=`pd.merge(estudiantes, carreras,\n         on='id_carrera', how=<b>'${how}'</b>)   # ${rows.length} filas`;
        requestAnimationFrame(drawLinks);
      }
      const HOWS=['inner','left','right','outer'];
      /* #merge?how=outer abre directo con ese how (link compartible) */
      if(HOWS.includes(hashParams().how))how=hashParams().how;
      const howBtns=btnGroup(ctr,HOWS.map(h=>({label:h,value:h})),
        v=>{how=v;setHashParams({how:v});render();},false);
      howBtns[HOWS.indexOf(how)].classList.add('on');
      window.addEventListener('resize',drawLinks);
      RELAYOUT.push(drawLinks);
      render();
    }

    /* ---------- Tarjeta 2: concat ---------- */
    {
      const MAR=[['Café',2500],['Té',1800]], ABR=[['Jugo',2200],['Café',2600]];
      const STK=[[12],[8]];
      const card=el('div',{class:'card'},
        el('h3',{html:'<code>pd.concat</code>: apilar tablas'}),
        el('p',{class:'note',html:'concat no empareja nada: simplemente <b>apila</b>. Con <code>axis=0</code> apila filas '+
          '(¡y los índices se repiten si no usas <code>ignore_index=True</code>!); con <code>axis=1</code> pega columnas '+
          'alineando por índice.'}));
      sec.append(card);
      const ctr=el('div',{class:'controls'});card.append(ctr);
      const selAx=el('select',{},el('option',{value:'0'},'axis=0 (apilar filas)'),el('option',{value:'1'},'axis=1 (pegar columnas)'));
      const chk=el('input',{type:'checkbox',id:'igidx'});
      const chkLab=el('label',{for:'igidx'},chk,' ignore_index=True');
      ctr.append(selAx,chkLab);
      const cols=el('div',{class:'flexcols'});card.append(cols);
      const dA=el('div'),dB=el('div'),dR=el('div');cols.append(dA,dB,dR);
      const code=codeBox(card);
      function render(){
        dA.textContent='';dB.textContent='';dR.textContent='';
        const ax=selAx.value, ig=chk.checked;
        chkLab.style.display=ax==='0'?'':'none';
        const tA=new DfTable(dA,{caption:'ventas_marzo',columns:['producto','monto'],index:[0,1],rows:MAR});
        let tB,tR;
        if(ax==='0'){
          tB=new DfTable(dB,{caption:'ventas_abril',columns:['producto','monto'],index:[0,1],rows:ABR});
          const idx=ig?[0,1,2,3]:[0,1,0,1];
          tR=new DfTable(dR,{caption:'pd.concat([marzo, abril])',columns:['producto','monto'],
            index:idx,rows:[...MAR,...ABR]});
          [0,1].forEach(ri=>tR.rowEls[ri].querySelectorAll('.dfc:not(.i)').forEach(c=>c.classList.add('g0')));
          [2,3].forEach(ri=>tR.rowEls[ri].querySelectorAll('.dfc:not(.i)').forEach(c=>c.classList.add('g1')));
          if(!ig)[2,3].forEach(ri=>tR.rowEls[ri]._idx.classList.add('hl'));
          code.innerHTML=`pd.concat([ventas_marzo, ventas_abril]${ig?', <b>ignore_index=True</b>':''})`+
            (ig?'':'\n# ⚠️ índice repetido: 0, 1, 0, 1 — df.loc[0] devolvería DOS filas');
        }else{
          tB=new DfTable(dB,{caption:'stock',columns:['stock'],index:[0,1],rows:STK});
          tR=new DfTable(dR,{caption:'pd.concat([...], axis=1)',columns:['producto','monto','stock'],
            index:[0,1],rows:MAR.map((r,i)=>[...r,...STK[i]])});
          tR.cellEls.forEach(row=>{row[0].classList.add('g0');row[1].classList.add('g0');row[2].classList.add('g1');});
          code.innerHTML=`pd.concat([ventas_marzo, stock], <b>axis=1</b>)   # alinea por índice`;
        }
        tA.cellEls.forEach(row=>row.forEach(c=>c.classList.add('g0')));
        tB.cellEls.forEach(row=>row.forEach(c=>c.classList.add('g1')));
      }
      selAx.onchange=render;chk.onchange=render;
      render();
    }
  }
});

<script>
'use strict';
/* Módulo: Fechas — to_datetime, accesor .dt, Timedelta, resample y date_range
   (clase 22 de 2026-1 y Ejercicio Integrador 2). Datos verificados con pandas. */
(function(){
registerModule({
  id:'fechas',
  title:'Fechas',
  lead:'Una fecha guardada como texto ordena mal y no se puede restar. El flujo del curso: '+
       'parsear con to_datetime, extraer componentes con .dt, restar para obtener Timedelta '+
       'y agrupar en el tiempo con resample.',
  build(sec){

    /* ---------- Tarjeta 1: to_datetime + .dt ---------- */
    {
      const FECHAS=['2026-03-02','2026-03-15','2026-04-01','2026-04-18','2026-05-05'];
      const MONTOS=[8990,12500,7490,15990,9990];
      /* salidas reales de pandas para cada accesor */
      const DT={
        month:{col:'mes',vals:[3,3,4,4,5],code:".dt.month"},
        day:{col:'dia',vals:[2,15,1,18,5],code:".dt.day"},
        year:{col:'año',vals:[2026,2026,2026,2026,2026],code:".dt.year"},
        day_name:{col:'dia_sem',vals:['Monday','Sunday','Wednesday','Saturday','Tuesday'],code:".dt.day_name()"},
      };
      const card=el('div',{class:'card'},
        el('h3',{html:'<code>pd.to_datetime</code> y el accesor <code>.dt</code>'}),
        el('p',{class:'note',html:'Pedidos de una app de delivery. La columna llega como <b>texto</b>: '+
          'primero se parsea y recién entonces <code>.dt</code> puede extraer componentes.'}));
      sec.append(card);
      const ctr=el('div',{class:'controls'});card.append(ctr);
      const mount=el('div');card.append(mount);
      const code=codeBox(card);
      const note=el('p',{class:'note'});card.append(note);
      let parsed=false, acc=null;
      function render(){
        mount.textContent='';
        const cols=['fecha','monto'], rows=FECHAS.map((f,i)=>[f,MONTOS[i]]);
        if(acc){cols.push(DT[acc].col); rows.forEach((r,i)=>r.push(DT[acc].vals[i]));}
        const t=new DfTable(mount,{caption:parsed
          ?'df — fecha: datetime64[ns] ✓':'df — fecha: object (texto) ⚠️',
          columns:cols,index:[0,1,2,3,4],rows});
        if(acc)rows.forEach((_,i)=>t.cell(i,2).classList.add('dnew'));
        if(parsed)FECHAS.forEach((_,i)=>t.cell(i,0).classList.add('sel'));
        if(!parsed){
          code.textContent="df['fecha'].dtype   # object — solo texto disfrazado de fecha";
          note.innerHTML='Como texto, <code>.dt</code> no existe y el orden es alfabético. Parsea primero.';
        }else if(!acc){
          code.innerHTML="df['fecha'] = <b>pd.to_datetime</b>(df['fecha'])\ndf['fecha'].dtype   # datetime64[ns] ✓";
          note.innerHTML='Ahora sí: la columna es una fecha de verdad. Prueba los accesores <code>.dt</code>.';
        }else{
          code.innerHTML=`df['${DT[acc].col}'] = df['fecha']<b>${DT[acc].code}</b>`;
          note.innerHTML=acc==='day_name'
            ?'<b>day_name() habla inglés</b> por defecto — el clásico «¿por qué me salió Monday?». '+
             'Para español: <code>day_name(locale=\'es_CL\')</code> (si el sistema lo tiene instalado).'
            :'La columna nueva (azul) es numérica: sirve para filtrar y agrupar por periodo.';
        }
      }
      const bParse=el('button',{class:'btn primary',onclick:()=>{parsed=true;bParse.disabled=true;accBtns.forEach(b=>b.disabled=false);render();}},'pd.to_datetime(df[\'fecha\'])');
      ctr.append(bParse);
      const accBtns=btnGroup(ctr,[
        {label:'.dt.month',value:'month'},{label:'.dt.day',value:'day'},
        {label:'.dt.year',value:'year'},{label:'.dt.day_name()',value:'day_name'},
      ],v=>{acc=v;render();},false);
      accBtns.forEach(b=>b.disabled=true);
      render();
    }

    /* ---------- Tarjeta 2: Timedelta ---------- */
    {
      const PED=['2026-03-02','2026-03-15','2026-04-01','2026-04-18'];
      const ENT=['2026-03-05','2026-03-26','2026-04-02','2026-04-30'];
      const DIAS=[3,11,1,12]; /* (entrega - pedido).dt.days verificado */
      const card=el('div',{class:'card'},
        el('h3',{html:'Restar fechas: <code>Timedelta</code>'}),
        el('p',{class:'note',html:'Pedido y entrega de 4 despachos. Restar dos columnas de fecha '+
          'da un <b>Timedelta</b> («3 days») y <code>.dt.days</code> lo convierte en número — '+
          'así se calculan demoras y atrasos en el Ejercicio Integrador 2.'}));
      sec.append(card);
      const ctr=el('div',{class:'controls'});card.append(ctr);
      const mount=el('div');card.append(mount);
      const code=codeBox(card);
      let conDias=false;
      function render(){
        mount.textContent='';
        const cols=['pedido','entrega']; const rows=PED.map((p,i)=>[p,ENT[i]]);
        if(conDias){cols.push('demora'); rows.forEach((r,i)=>r.push(DIAS[i]));}
        const t=new DfTable(mount,{columns:cols,index:[0,1,2,3],rows});
        if(conDias){
          rows.forEach((_,i)=>t.cell(i,2).classList.add('dnew'));
          const max=Math.max(...DIAS), maxI=DIAS.indexOf(max);
          t.cell(maxI,2).classList.add('hl');
          code.innerHTML="df['demora'] = (df['entrega'] - df['pedido'])<b>.dt.days</b>\ndf['demora'].max()   # "+max+" días — el despacho más lento";
        }else{
          code.textContent="df['entrega'] - df['pedido']   # Serie de Timedelta: '3 days', '11 days', …";
        }
      }
      btnGroup(ctr,[
        {label:'restar fechas',value:false},
        {label:"+ columna demora (.dt.days)",value:true},
      ],v=>{conDias=v;render();});
      render();
    }

    /* ---------- Tarjeta 3: resample (groupby en el tiempo) ---------- */
    {
      /* boletas desordenadas, como llegan en la vida real */
      const ROWS=[['2026-03-03',1200],['2026-04-05',900],['2026-03-18',800],['2026-05-10',700],
                  ['2026-04-22',1100],['2026-03-29',1500],['2026-05-19',1300],['2026-05-30',600]];
      const MESCLS={3:'g0',4:'g1',5:'g2'};
      const MESNOM={3:'marzo',4:'abril',5:'mayo'};
      const SUMS=[['2026-03-31',3500],['2026-04-30',2000],['2026-05-31',2600]]; /* verificado */
      const card=el('div',{class:'card'},
        el('h3',{html:'<code>resample</code>: groupby en el tiempo'}),
        el('p',{class:'note',html:'Ventas sueltas de la cafetería → total por mes. '+
          '<code>resample(\'ME\')</code> agrupa por periodo calendario (ME = fin de mes; '+
          'en versiones antiguas de pandas se escribía <code>\'M\'</code>).'}));
      sec.append(card);
      const holder=el('div',{style:'display:flex;gap:1.4rem;flex-wrap:wrap;align-items:flex-start'});
      card.append(holder);
      const mLeft=el('div'),mRight=el('div');holder.append(mLeft,mRight);
      const code=codeBox(card);
      let t=null;
      const mes=f=>+f.slice(5,7);
      function reset(){
        mLeft.textContent='';mRight.textContent='';
        t=new DfTable(mLeft,{caption:'ventas (como llegaron)',columns:['fecha','monto'],
          index:[...ROWS.keys()],rows:ROWS.map(r=>[...r])});
        code.textContent="serie = df.set_index('fecha').resample('ME')['monto'].sum()";
      }
      const steps=[
        {d:'<b>Etiquetar.</b> <code>set_index(\'fecha\')</code> + <code>resample(\'ME\')</code> asignan cada boleta '+
           'a su periodo: un color por mes.',
         async run(){
           ROWS.forEach((r,i)=>{
             t.cell(i,0).classList.add(MESCLS[mes(r[0])]);
             t.cell(i,1).classList.add(MESCLS[mes(r[0])]);
           });
         }},
        {d:'<b>Ordenar.</b> El índice temporal ordena cronológicamente — las boletas de cada mes quedan juntas.',
         async run(){
           const order=[...ROWS.keys()].sort((a,b)=>ROWS[a][0]<ROWS[b][0]?-1:1);
           flipRows(t.root,()=>{
             order.forEach(i=>t.root.append(t.rowEls[i]));
           });
           await sleep(650);
         }},
        {d:'<b>Colapsar.</b> Cada grupo se reduce a UNA fila con la suma del mes. Ojo: la etiqueta es el '+
           '<b>fin de mes</b> (2026-03-31), no el inicio.',
         async run(){
           mRight.textContent='';
           const tr=new DfTable(mRight,{caption:"resample('ME')['monto'].sum()",
             columns:['monto'],index:SUMS.map(s=>s[0]),rows:SUMS.map(s=>[s[1]])});
           SUMS.forEach((s,i)=>tr.cell(i,0).classList.add(MESCLS[mes(s[0])]));
           code.innerHTML="serie = df.set_index('fecha').resample(<b>'ME'</b>)['monto'].sum()\n# 2026-03-31    3500   ← marzo\n# 2026-04-30    2000   ← abril\n# 2026-05-31    2600   ← mayo";
         }},
      ];
      reset();
      new Stepper(card,steps,reset,'fechas');
      card.append(el('p',{class:'note',html:'La agrupación por mes también se logra con '+
        '<code>df.groupby(df[\'fecha\'].dt.month)</code> — pero resample respeta el calendario '+
        '(meses sin ventas aparecen con 0) y permite frecuencias como \'W\' o \'D\'.'}));
    }

    /* ---------- Tarjeta 4: date_range ---------- */
    {
      const RANGES={ /* pd.date_range('2026-01-01', periods=6, freq=…) verificado */
        'D':  ['2026-01-01','2026-01-02','2026-01-03','2026-01-04','2026-01-05','2026-01-06'],
        'W':  ['2026-01-04','2026-01-11','2026-01-18','2026-01-25','2026-02-01','2026-02-08'],
        'ME': ['2026-01-31','2026-02-28','2026-03-31','2026-04-30','2026-05-31','2026-06-30'],
        '12h':['01-01 00:00','01-01 12:00','01-02 00:00','01-02 12:00','01-03 00:00','01-03 12:00'],
      };
      const NOTAS={
        'D':'Un día tras otro: la base para construir calendarios completos y detectar días sin datos.',
        'W':'<b>\'W\' ancla al domingo</b>: la primera fecha no es el 1 de enero sino el primer domingo (2026-01-04).',
        'ME':'Fin de cada mes — las mismas etiquetas que produce <code>resample(\'ME\')</code>.',
        '12h':'También hay frecuencias con hora: cada 12 horas, \'6h\', \'30min\'…',
      };
      const card=el('div',{class:'card'},
        el('h3',{html:'<code>pd.date_range</code>: fabricar fechas'}),
        el('p',{class:'note',html:'Genera secuencias regulares de fechas. En el Ejercicio Integrador 2 se usa '+
          'para armar el calendario completo y descubrir días sin pedidos.'}));
      sec.append(card);
      const ctr=el('div',{class:'controls'});card.append(ctr);
      const chips=el('div');card.append(chips);
      const code=codeBox(card);
      const note=el('p',{class:'note'});card.append(note);
      function render(freq){
        chips.textContent='';
        RANGES[freq].forEach(f=>chips.append(el('span',{class:'chip'},f)));
        code.innerHTML=`pd.date_range('2026-01-01', periods=6, freq=<b>'${freq}'</b>)`;
        note.innerHTML=NOTAS[freq];
      }
      btnGroup(ctr,[
        {label:"freq='D' (diaria)",value:'D'},{label:"'W' (semanal)",value:'W'},
        {label:"'ME' (mensual)",value:'ME'},{label:"'12h'",value:'12h'},
      ],render);
      render('D');
    }
  }
});
})();

<script>
'use strict';
/* =====================================================================
   Motor de ejercicios — secciones del menú «Ejercicios»
     · Predice la salida (idea 1): código → el estudiante elige qué imprime
       → se revela la respuesta con visual y explicación.
     · Detective de bugs (idea 2): código con UN error plantado → el
       estudiante hace clic en la línea culpable.
   Los bancos viven en js/ex-banco.js (BANCO_PREDICE, BANCO_BUGS):
     predice: {tema, origen, nivel, code, opciones[], correcta, explica, visual?}
     bug:     {tema, origen, nivel, lineas[], bug, pista, explica, fix, visual?}
   `visual(mount)` es opcional y dibuja la respuesta con DfTable/CellGrid/dfDiff.
   ===================================================================== */

const EX_TEMAS=[
  ['todos','Todos'],['numpy','NumPy'],['df','DataFrames'],['nulos','Nulos'],
  ['outliers','Outliers'],['wrangling','Wrangling'],['groupby','GroupBy'],
  ['merge','Joins'],['fechas','Fechas'],
];
const NIVEL=n=>'●'.repeat(n)+'○'.repeat(3-n);

/* barra común: filtro por tema + marcador de sesión */
function exToolbar(sec,onFilter){
  const score={ok:0,tot:0,racha:0};
  const marker=el('span',{class:'exscore'},'0/0 · racha 0');
  const bar=el('div',{class:'controls'});
  btnGroup(bar,EX_TEMAS.map(([v,l])=>({label:l,value:v})),onFilter);
  bar.append(marker);
  sec.append(bar);
  return {
    score,
    hit(ok){ score.tot++; if(ok){score.ok++; score.racha++;}else score.racha=0;
      marker.textContent=`${score.ok}/${score.tot} · racha ${score.racha}`;
      if(ok&&score.racha>0&&score.racha%5===0)marker.textContent+=' 🔥'; },
  };
}
function exMeta(q){
  return el('div',{class:'exmeta'},
    el('span',{class:'exbadge'},q.origen),
    el('span',{class:'exnivel',title:'dificultad'},NIVEL(q.nivel||1)));
}
/* baraja sin mutar el banco */
const exShuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};

/* ---------------- Predice la salida ---------------- */
registerExercise({
  id:'predice',
  title:'Predice la salida',
  lead:'Lee el código, decide qué imprime y recién entonces revela la respuesta. '+
       'Preguntas basadas en los controles y certámenes reales del curso.',
  build(sec){
    const banco=(typeof BANCO_PREDICE!=='undefined')?BANCO_PREDICE:[];
    if(!banco.length){sec.append(el('p',{class:'note'},'No hay banco cargado.'));return;}
    let filtro='todos', lista=banco, i=0;
    const tb=exToolbar(sec,v=>{filtro=v; lista=v==='todos'?banco:banco.filter(q=>q.tema===v); i=0; show();});
    const host=el('div');sec.append(host);
    function show(){
      host.textContent='';
      if(!lista.length){host.append(el('p',{class:'note'},'No hay preguntas de este tema todavía.'));return;}
      const q=lista[i%lista.length];
      const card=el('div',{class:'card exq'},exMeta(q),
        el('h3',{},`Pregunta ${ (i%lista.length)+1} de ${lista.length}`));
      const code=codeBox(card); code.textContent=q.code;
      card.append(el('p',{class:'note'},'¿Qué imprime? Piensa tu respuesta antes de elegir.'));
      const opts=el('div',{class:'exopts'});card.append(opts);
      const reveal=el('div',{class:'exreveal'});card.append(reveal);
      let done=false;
      q.opciones.forEach((o,oi)=>{
        const b=el('button',{class:'btn exopt',onclick:()=>{
          if(done)return; done=true;
          const ok=(oi===q.correcta);
          tb.hit(ok);
          [...opts.children].forEach((bb,bi)=>{
            bb.disabled=true;
            if(bi===q.correcta)bb.classList.add('good');
            else if(bi===oi)bb.classList.add('bad');
          });
          reveal.append(el('div',{class:'msg '+(ok?'okc':'err')},
            ok?'✔ ¡Correcto!':'✘ No era esa — mira por qué:'));
          reveal.append(el('p',{class:'note',html:q.explica}));
          if(q.visual){const vm=el('div',{class:'exvisual'});reveal.append(vm);q.visual(vm);RELAYOUT.forEach(f=>f());}
        }},el('pre',{class:'optcode'},o));
        opts.append(b);
      });
      const nav=el('div',{class:'controls'},
        el('button',{class:'btn',onclick:()=>{i=(i-1+lista.length)%lista.length;show();}},'◀ Anterior'),
        el('button',{class:'btn primary',onclick:()=>{i=(i+1)%lista.length;show();}},'Siguiente ▶'),
        el('button',{class:'btn',onclick:()=>{lista=exShuffle(lista);i=0;show();}},'🔀 Barajar'));
      card.append(nav);
      host.append(card);
    }
    show();
  },
});

  id:'detective',
  title:'Detective de bugs',
  lead:'Cada código tiene UN error clásico plantado. Haz clic en la línea culpable '+
       'y descubre qué pasa realmente al ejecutarlo.',
  build(sec){
    const banco=(typeof BANCO_BUGS!=='undefined')?BANCO_BUGS:[];
    if(!banco.length){sec.append(el('p',{class:'note'},'No hay banco cargado.'));return;}
    let lista=banco, i=0;
    const tb=exToolbar(sec,v=>{lista=v==='todos'?banco:banco.filter(q=>q.tema===v); i=0; show();});
    const host=el('div');sec.append(host);
    function show(){
      host.textContent='';
      if(!lista.length){host.append(el('p',{class:'note'},'No hay casos de este tema todavía.'));return;}
      const q=lista[i%lista.length];
      const card=el('div',{class:'card exq'},exMeta(q),
        el('h3',{},`Caso ${(i%lista.length)+1} de ${lista.length}: ¿dónde está el bug?`));
      const pre=el('pre',{class:'code buglines'});card.append(pre);
      const reveal=el('div',{class:'exreveal'});card.append(reveal);
      let done=false, intentos=0;
      q.lineas.forEach((ln,li)=>{
        const d=el('div',{class:'bugline',onclick:()=>{
          if(done)return;
          if(li===q.bug){
            done=true; tb.hit(intentos===0);
            d.classList.add('bughit');
            reveal.append(el('div',{class:'msg okc'},intentos===0?'✔ ¡Primer intento!':'✔ Encontrado.'));
            reveal.append(el('p',{class:'note',html:q.explica}));
            const fix=codeBox(reveal); fix.innerHTML='# corregido\n'+q.fix;
            if(q.visual){const vm=el('div',{class:'exvisual'});reveal.append(vm);q.visual(vm);RELAYOUT.forEach(f=>f());}
          }else{
            intentos++;
            d.classList.add('bugmiss');
            setTimeout(()=>d.classList.remove('bugmiss'),450);
            if(intentos===2&&q.pista)reveal.append(el('p',{class:'note',html:'💡 <b>Pista:</b> '+q.pista}));
          }
        }},ln||' ');
        pre.append(d);
      });
      const nav=el('div',{class:'controls'},
        el('button',{class:'btn',onclick:()=>{i=(i-1+lista.length)%lista.length;show();}},'◀ Anterior'),
        el('button',{class:'btn primary',onclick:()=>{i=(i+1)%lista.length;show();}},'Siguiente ▶'),
        el('button',{class:'btn',onclick:()=>{lista=exShuffle(lista);i=0;show();}},'🔀 Barajar'));
      card.append(nav);
      host.append(card);
    }
    show();
  },
});

</script>

registerExercise({
  id:'traductor',
  title:'Traductor de errores',
  lead:'Pega el traceback tal cual te lo escupió Python y recibe qué significa, '+
       'por qué pasa y cómo se arregla — en español.',
  build(sec){
    const card=el('div',{class:'card'},
      el('h3',{},'Pega tu error aquí'),
      el('p',{class:'note',html:'Consejo de lectura: en un traceback largo, la información útil está en la '+
        '<b>última línea</b> (el tipo de error) y en la primera línea que apunte a <b>tu</b> código.'}));
    sec.append(card);
    const ta=el('textarea',{class:'tberror',rows:5,
      placeholder:'KeyError: \'sucursal\'\n…o el traceback completo, da lo mismo'});
    card.append(ta);
    const ctr=el('div',{class:'controls'});card.append(ctr);
    const out=el('div');card.append(out);
    const chips=el('div',{class:'controls'},el('label',{},'o prueba uno: '));
    EJEMPLOS.forEach(([txt,lbl])=>chips.append(
      el('button',{class:'btn',onclick:()=>{ta.value=txt;traducir();}},lbl)));
    card.append(chips);

    function traducir(){
      out.textContent='';
      const txt=ta.value.trim();
      if(!txt)return;
      const hit=ERRORES.find(e=>e.re.test(txt));
      if(!hit){
        out.append(el('div',{class:'card',style:'margin:.6rem 0'},
          el('h3',{},'🤷 No lo tengo catalogado (todavía)'),
          el('p',{class:'note',html:'Pistas generales: ① lee la <b>última línea</b> del traceback — ahí está el tipo '+
            'de error y el mensaje; ② ubica la flecha que apunta a una línea escrita por ti (no de las librerías); '+
            '③ imprime <code>df.dtypes</code> y <code>df.columns</code> — la mitad de los errores del curso son '+
            'una columna con el tipo o el nombre equivocado.'})));
        return;
      }
      const c=el('div',{class:'card',style:'margin:.6rem 0'});
      c.append(el('h3',{},'🔍 '+hit.nombre),
        el('p',{class:'note',html:'<b>Qué significa:</b> '+hit.trad}),
        el('p',{class:'note',html:'<b>Por qué pasa:</b> '+hit.causa}));
      const fx=codeBox(c);fx.textContent=hit.fix;
      if(hit.mod)c.append(el('p',{class:'note',html:
        `📚 Está ilustrado en el <a href="#${hit.mod[0]}">módulo ${hit.mod[1]}</a>.`}));
      out.append(c);
    }
    ctr.append(el('button',{class:'btn primary',onclick:traducir},'Traducir error'));
    ta.addEventListener('input',()=>{ if(ta.value.length>8)traducir(); });
  },
});
})();

</script>

const EJEMPLOS={
 numpy:"import numpy as np\n\ncasos = np.array([[10, 12, 8],\n                  [20, 25, 30]])\nprint(casos.sum(axis=0))\nprint(casos.mean(axis=1))",
 pandas:"import pandas as pd\n\ndf = pd.DataFrame({\n  'sucursal': ['Centro','San Pedro','Centro','Talcahuano'],\n  'total': [4000, 3000, 2000, 9000]})\n\ndf.groupby('sucursal')['total'].sum().sort_values(ascending=False)",
 fechas:"import pandas as pd\n\nf = pd.Series(pd.to_datetime(['2026-03-02','2026-04-15','2026-04-20']))\nprint(f.dt.month.tolist())\nprint((f.max() - f.min()).days, 'días de rango')",
};

registerExercise({
  id:'python',
  title:'Python real (Pyodide)',
  lead:'NumPy y Pandas auténticos corriendo en tu navegador. Escribe código, ejecútalo '+
       'y compara con lo que predijiste — sin instalar nada.',
  build(sec){
    const card=el('div',{class:'card'},
      el('h3',{},'🐍 Sandbox de NumPy/Pandas'),
      el('p',{class:'note',html:'La primera vez descarga el intérprete (~15 MB, <b>requiere internet</b>); '+
        'después todo corre local en tu navegador. Nada sale de tu equipo.'}));
    sec.append(card);
    const ctr=el('div',{class:'controls'});card.append(ctr);
    const bLoad=el('button',{class:'btn primary'},'⬇️ Cargar Python (una vez)');
    const status=el('span',{class:'msg',style:'margin:0'},'');
    ctr.append(bLoad,status);
    const ta=el('textarea',{class:'pyin',rows:9,spellcheck:'false'});
    ta.value=EJEMPLOS.pandas;
    const run=el('button',{class:'btn primary',disabled:''},'▶ Ejecutar (Ctrl+Enter)');
    const chips=el('div',{class:'controls'},el('label',{},'ejemplos: '));
    Object.entries({numpy:'NumPy',pandas:'GroupBy',fechas:'Fechas'}).forEach(([k,lbl])=>
      chips.append(el('button',{class:'btn',onclick:()=>{ta.value=EJEMPLOS[k];}},lbl)));
    const out=el('pre',{class:'code',style:'min-height:3rem;white-space:pre-wrap'});
    out.textContent='# la salida aparecerá aquí';
    card.append(ta,el('div',{class:'controls'},run),chips,out);
    card.append(el('p',{class:'note',html:'Tip de ayudantía: predice la salida ANTES de ejecutar '+
      '(como en <a href="#predice">Predice la salida</a>). Si te lanza un error críptico, '+
      'pásalo por el <a href="#traductor">Traductor de errores</a>.'}));

    let py=null, cargando=false;
    async function cargar(){
      if(py||cargando)return; cargando=true;
      bLoad.disabled=true;
      try{
        status.textContent='descargando intérprete…';
        if(!window.loadPyodide){
          await new Promise((res,rej)=>{
            const sc=document.createElement('script');
            sc.src='https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js';
            sc.onload=res; sc.onerror=()=>rej(new Error('sin conexión al CDN'));
            document.head.append(sc);
          });
        }
        py=await loadPyodide();
        status.textContent='instalando numpy y pandas…';
        await py.loadPackage(['numpy','pandas']);
        py.runPython('import sys, io');
        status.textContent='✅ listo — ejecuta tu código';
        status.className='msg okc';
        bLoad.style.display='none';
        run.disabled=false;
      }catch(e){
        status.textContent='✘ no se pudo cargar ('+e.message+'). ¿Hay internet?';
        status.className='msg err';
        bLoad.disabled=false; cargando=false;
      }
    }
    bLoad.onclick=cargar;

    async function ejecutar(){
      if(!py)return;
      run.disabled=true; out.textContent='⏳ ejecutando…';
      py.runPython('sys.stdout = io.StringIO(); sys.stderr = sys.stdout');
      try{
        const r=await py.runPythonAsync(ta.value);
        let txt=py.runPython('sys.stdout.getvalue()');
        if(r!==undefined&&r!==null){
          txt+=(txt&&!txt.endsWith('\n')?'\n':'')+r.toString();
          if(r.destroy)try{r.destroy();}catch(_){/* valores primitivos no tienen destroy */}
        }
        out.textContent=txt.trim()||'(sin salida — usa print() o deja una expresión al final)';
      }catch(e){
        const txt=py.runPython('sys.stdout.getvalue()');
        /* del traceback de Pyodide, lo útil es de la línea del código del usuario hacia abajo */
        const msg=String(e.message||e).split('\n').filter(l=>!/pyodide|_pyodide|<exec>"?, line 0/.test(l)).join('\n');
        out.textContent=(txt?txt+'\n':'')+msg.trim();
      }
      run.disabled=false;
    }
    run.onclick=ejecutar;
    ta.addEventListener('keydown',e=>{
      if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();ejecutar();}
    });
  },
});
})();

</script>
<script>
'use strict';
/* Grabar animaciones (idea 13): captura la pestaña con getDisplayMedia +
   MediaRecorder y descarga un .webm — listo para Canvas o para convertir a GIF.
   Sin dependencias; el botón solo aparece si el navegador lo soporta. */
(function(){
  function init(){
    if(!navigator.mediaDevices||!navigator.mediaDevices.getDisplayMedia||!window.MediaRecorder)return;
    const hdr=document.querySelector('.hdrbtns');
    if(!hdr)return;
    const btn=el('button',{id:'btnRec',
      title:'Graba la pantalla mientras corres una animación y descarga un .webm '+
            '(sirve para slides, Canvas o convertir a GIF)'},'🎥 Grabar');
    hdr.append(btn);
    let rec=null;

    async function start(){
      let stream;
      try{
        stream=await navigator.mediaDevices.getDisplayMedia({
          video:{frameRate:30},
          audio:false,
          /* sugerir "esta pestaña" en el diálogo de Chrome/Edge */
          preferCurrentTab:true,selfBrowserSurface:'include'});
      }catch(_){return;/* canceló el diálogo */}
      const mime=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
        ?'video/webm;codecs=vp9':'video/webm';
      const chunks=[];
      rec=new MediaRecorder(stream,{mimeType:mime});
      rec.ondataavailable=e=>{if(e.data.size)chunks.push(e.data);};
      rec.onstop=()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob=new Blob(chunks,{type:'video/webm'});
        const mod=hashId()||'animacion';
        const a=el('a',{href:URL.createObjectURL(blob),
          download:`visualizador-${mod}-${new Date().toISOString().slice(0,10)}.webm`});
        document.body.append(a);a.click();a.remove();
        setTimeout(()=>URL.revokeObjectURL(a.href),5000);
        rec=null;btn.textContent='🎥 Grabar';btn.classList.remove('rec-on');
      };
      /* si el usuario corta la compartición desde la barra del navegador */
      stream.getVideoTracks()[0].addEventListener('ended',()=>{if(rec&&rec.state!=='inactive')rec.stop();});
      rec.start();
      btn.textContent='⏹ Detener';btn.classList.add('rec-on');
    }
    btn.onclick=()=>{ if(rec&&rec.state!=='inactive')rec.stop(); else start(); };
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
  else init();
})();

</script>
